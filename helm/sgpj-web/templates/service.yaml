apiVersion: v1
kind: Service
metadata:
  name: {{ include "escala-agro-web.fullname" . }}-service
  labels:
  {{- include "escala-agro-web.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
  {{- include "escala-agro-web.selectorLabels" . | nindent 4 }}
  ports:
	{{- .Values.ports | toYaml | nindent 2 -}}


