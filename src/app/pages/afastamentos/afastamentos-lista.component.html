<p-toast />
<p-confirmdialog />
<div class="p-4 max-w-6xl mx-auto">
    <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
        <div>
            <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 m-0 mb-1">Afastamentos</h1>
            <p class="text-color-secondary m-0">{{ subtitulo }}</p>
        </div>
        <button
            pButton
            type="button"
            label="Criar afastamento"
            icon="pi pi-plus"
            (click)="abrirCriar()"
            [disabled]="carregando"
        ></button>
    </div>

    <p-table [value]="afastamentos" [loading]="carregando" styleClass="p-datatable-sm" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th *ngIf="modo === 'admin'">Veterinário</th>
                <th>Tipo</th>
                <th>Data início</th>
                <th>Data fim</th>
                <th class="text-center" style="width: 10rem">Ações</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
            <tr>
                <td *ngIf="modo === 'admin'">
                    <span class="font-medium">{{ row.usuario?.nome || '—' }}</span>
                    <span class="text-color-secondary text-sm" *ngIf="row.usuario?.login"> · {{ row.usuario.login }}</span>
                </td>
                <td>{{ labelTipo(row) }}</td>
                <td>{{ formatoData(row.dataInicio) }}</td>
                <td>{{ formatoData(row.dataFim) }}</td>
                <td class="text-center">
                    <button
                        pButton
                        pRipple
                        type="button"
                        label="Desfazer"
                        icon="pi pi-undo"
                        class="p-button-sm p-button-text p-button-danger"
                        [loading]="desfazendoId === row.id"
                        [disabled]="desfazendoId != null && desfazendoId !== row.id"
                        (click)="confirmarDesfazer(row)"
                    ></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td [attr.colspan]="modo === 'admin' ? 5 : 4" class="text-center p-4">Nenhum afastamento encontrado.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog
    [(visible)]="dialogAberto"
    header="Registrar afastamento"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [style]="{ width: 'min(28rem, 95vw)' }"
    (onHide)="fecharDialog()"
>
    <ng-template pTemplate="content">
        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2" *ngIf="modo === 'admin'">
                <label for="afUser" class="font-medium">Veterinário *</label>
                <p-dropdown
                    inputId="afUser"
                    [options]="opcoesUsuarioDropdown()"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Selecione..."
                    [(ngModel)]="usuarioIdSelecionado"
                    [showClear]="true"
                    styleClass="w-full"
                    appendTo="body"
                ></p-dropdown>
            </div>
            <div class="flex flex-col gap-2">
                <label for="afTipo" class="font-medium">Tipo *</label>
                <p-dropdown
                    inputId="afTipo"
                    [options]="opcoesTipoDropdown()"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Selecione..."
                    [(ngModel)]="tipoIdSelecionado"
                    (onChange)="aoAlterarTipoAfastamento()"
                    [showClear]="true"
                    styleClass="w-full"
                    appendTo="body"
                ></p-dropdown>
            </div>
            <div class="flex flex-col gap-2">
                <label for="afIni" class="font-medium">{{ tipoSelecionadoEhAbono() ? 'Data do abono *' : 'Data início *' }}</label>
                <p-calendar
                    inputId="afIni"
                    [(ngModel)]="dataInicio"
                    (onSelect)="aoAlterarDataInicio()"
                    dateFormat="dd/mm/yy"
                    [showIcon]="true"
                    styleClass="w-full"
                    appendTo="body"
                ></p-calendar>
            </div>
            <div class="flex flex-col gap-2" *ngIf="!tipoSelecionadoEhAbono()">
                <label for="afFim" class="font-medium">Data fim *</label>
                <p-calendar
                    inputId="afFim"
                    [(ngModel)]="dataFim"
                    dateFormat="dd/mm/yy"
                    [showIcon]="true"
                    styleClass="w-full"
                    appendTo="body"
                ></p-calendar>
            </div>
        </div>
    </ng-template>
    <ng-template pTemplate="footer">
        <button pButton type="button" label="Cancelar" class="p-button-text" (click)="fecharDialog()" [disabled]="salvando"></button>
        <button
            pButton
            type="button"
            label="Salvar"
            icon="pi pi-check"
            (click)="salvar()"
            [loading]="salvando"
            [disabled]="salvando || tipos.length === 0 || (modo === 'admin' && veterinarios.length === 0)"
        ></button>
    </ng-template>
</p-dialog>
