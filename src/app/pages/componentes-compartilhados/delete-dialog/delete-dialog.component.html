<p-dialog [(visible)]="visible" [header]="header" (onHide)="cancel()" [modal]="true" [style]="{width:'450px'}">
    <div class="flex align-items-center justify-content-center">
        <i class="pi pi-exclamation-triangle mr-3" style="font-size: 2rem"></i>
        <span *ngIf="item">{{message}} <b>{{item.nome}}</b>?</span>
    </div>
    <ng-template pTemplate="footer">
        <button pButton pRipple icon="pi pi-times" class="p-button-text" label="{{constantes.noLabel}}"
            (click)="cancel()"></button>
        <button pButton pRipple icon="pi pi-check" label="{{constantes.yesLabel}}" (click)="confirm()"></button>
    </ng-template>

</p-dialog>
