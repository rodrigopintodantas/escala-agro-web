<p-toast />
<div class="p-4">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div>
            <h1 class="text-2xl font-semibold m-0">Servidores — veterinários</h1>
            <p class="text-color-secondary m-0 mt-1 text-sm">Saldo = quantidade de plantões previstos ou confirmados no sistema.</p>
        </div>
    </div>

    <p-table [value]="linhas" [loading]="carregando" [paginator]="true" [rows]="15" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Nome</th>
                <th>Login</th>
                <th style="width: 10rem">Saldo de plantões</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
            <tr>
                <td>{{ row.nome }}</td>
                <td><span class="font-mono text-sm">{{ row.login }}</span></td>
                <td>
                    <span
                        class="inline-flex items-center justify-center min-w-[2.5rem] rounded-full px-3 py-1 text-sm font-semibold"
                        [ngClass]="{
                            'bg-primary-100 text-primary-900 dark:bg-primary-900/40 dark:text-primary-100': row.saldo > 0,
                            'bg-surface-100 text-surface-600 dark:bg-surface-800': row.saldo === 0
                        }"
                    >
                        {{ row.saldo }}
                    </span>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center p-4">Nenhum veterinário encontrado.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
