<p-toast />
<p-confirmdialog />
<div class="p-4">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div>
            <h1 class="text-2xl font-semibold m-0">Servidores — veterinários</h1>
            <p class="text-color-secondary m-0 mt-1 text-sm">Gestão de veterinários ativos no sistema.</p>
        </div>
    </div>

    <p-table [value]="linhas" [loading]="carregando" [paginator]="true" [rows]="15" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Nome</th>
                <th>Login</th>
                <th style="width: 8rem">Ações</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
            <tr>
                <td>{{ row.nome }}</td>
                <td><span class="font-mono text-sm">{{ row.login }}</span></td>
                <td>
                    <button
                        pButton
                        pRipple
                        type="button"
                        [icon]="existeEscalaAtiva ? (row.suspensoEscala ? 'pi pi-play' : 'pi pi-pause') : 'pi pi-trash'"
                        [severity]="existeEscalaAtiva ? (row.suspensoEscala ? 'success' : 'warn') : 'danger'"
                        class="p-button-rounded p-button-sm"
                        [pTooltip]="existeEscalaAtiva ? (row.suspensoEscala ? 'Reativar Servidor' : 'Suspender Servidor') : 'Excluir veterinário'"
                        tooltipPosition="top"
                        (click)="confirmarExcluir(row)"
                        [loading]="(excluindoId === row.id) || (suspenderId === row.id)"
                        [disabled]="
                            (excluindoId !== null && excluindoId !== row.id) ||
                            (suspenderId !== null && suspenderId !== row.id)
                        "
                    ></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center p-4">Nenhum veterinário encontrado.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
